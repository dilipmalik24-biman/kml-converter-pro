name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good libsqlite3-dev sqlite3 libtool autoconf automake pkg-config libffi-dev libssl-dev
          pip install --upgrade pip setuptools virtualenv cython==0.29.36 buildozer

      - name: Build with Buildozer
        run: |
          buildozer android debug
        env:
          BUILDOZER_ALLOW_KIVY_NEW_DESIGNER: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KML-Converter-APK
          path: bin/*.apk
          
