name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good libsqlite3-dev libtool autoconf automake pkg-config
        pip install --upgrade pip
        pip install cython buildozer sh

    - name: Run Buildozer Build
      run: |
        yes | buildozer -v android debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: KML-Converter-Pro-APK
        path: bin/*.apk
        
